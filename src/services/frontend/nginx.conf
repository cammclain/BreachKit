# Main NGINX server block
server {
    listen 80;
    server_name localhost;

    # Proxy settings for forwarding requests to the Litestar backend
    location / {
        proxy_pass http://backend:8003;

        # Forward headers to preserve client information
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings for large responses
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Handle large response bodies
        client_max_body_size 10M;

        # Disable buffering to stream responses immediately
        proxy_buffering off;
    }

    # Serve static files (CSS, images, etc.)
    location /static/ {
        alias /breachkit_core/static/;
        autoindex on;  # Helpful for debugging if the static directory is accessible
    }

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options "DENY";
    add_header X-XSS-Protection "1; mode=block";

    # Log files
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}
