# Define the main HTTP server block
server {
    # Listen on port 80 (default HTTP port)
    listen 80;

    # Define the server's hostname (use localhost since it's behind Tor)
    server_name localhost;

    # Proxy settings to forward requests to the Litestar application
    location / {
        # Set proxy to the Litestar backend (assuming it runs on port 8000)
        proxy_pass http://backend:8000;

        # Preserve the host header to maintain request info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Set timeout settings for the reverse proxy
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Handle large responses (such as reports from Ollama)
        client_max_body_size 10M;

        # Disable buffering to immediately stream responses
        proxy_buffering off;
    }

    # Static files (like CSS from Bulma)
    location /static/ {
        alias /src/breachkit_core/static/;
        # Ensure correct MIME types are set for CSS and other assets
        add_header Content-Type text/css;
    }

    # Security headers to prevent common attacks
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options "DENY";
    add_header X-XSS-Protection "1; mode=block";

    # Redirect all non-hidden service requests to HTTPS (if applicable)
    return 301 https://$host$request_uri;

    # Access and error logs (useful for debugging)
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}

# HTTPS server block for secure communication (optional)
server {
    listen 443 ssl;

    # Example SSL settings (if using HTTPS)
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    server_name localhost;

    # Proxy settings same as above
    location / {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location /static/ {
        alias /src/breachkit_core/static/;
    }

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options "DENY";
    add_header X-XSS-Protection "1; mode=block";

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}
