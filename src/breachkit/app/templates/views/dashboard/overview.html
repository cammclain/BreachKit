<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="/static/css/bulma.css">
    <title>BreachKit - Overview</title>
</head>
<body>
    <header>
        {% include "partials/header.html" %}
    </header>
    <section class="section">
        <div class="container">
            <h1 class="title">Operations Overview</h1>
            <table class="table is-fullwidth">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for operation in operations %}
                    <tr>
                        <td>{{ operation.id }}</td>
                        <td>{{ operation.name }}</td>
                        <td>{{ operation.status }}</td>
                        <td>
                            <a href="/operation/{{ operation.id }}">View</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </section>
    <footer>
        {% include "partials/footer.html" %}
    </footer>
</body>
</html>
