version: '3.8'

services:
  backend:
    build: ./src/breachkit
    container_name: breachkit_backend
    ports:
      - "8000:8000"
    depends_on:
      - surrealdb
      - prosodyim
    environment:
      - DATABASE_URL=http://surrealdb:8000/rpc
      - XMPP_SERVER=prosodyim:5222

  surrealdb:
    image: surrealdb/surrealdb:latest
    container_name: breachkit_surrealdb
    ports:
      - "8001:8000"
    command: start --log debug

  prosodyim:
    build: ./src/prosodyim
    container_name: prosodyim_server
    ports:
      - "5222:5222"
      - "5269:5269"
    command: prosodyctl start

  seaweedfs:
    build: ./src/seaweedfs
    container_name: seaweedfs
    ports:
      - "9333:9333"
      - "8888:8888"
